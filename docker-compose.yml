version: '3.8'

services:
  audit-service:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./events.jsonl:/app/events.jsonl:ro
    environment:
      - DATABASE_PATH=/data/audit_events.duckdb
      - RETENTION_DAYS=90
      - EVENTS_FILE_PATH=/app/events.jsonl
      - API_HOST=0.0.0.0
      - API_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
